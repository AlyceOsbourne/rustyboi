<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RustyBoi Emulator</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    padding: 4px;
    font-family: "MS Sans Serif", Tahoma, sans-serif;
    background: #C0C0C0;
    color: #000;
    font-size: 13px;
}

/* ===== MENU BAR ===== */
.menu-bar {
    display: flex;
    gap: 2px;
    padding: 2px;
    border: 2px outset #fff;
    background: #C0C0C0;
    margin-bottom: 6px;
}

.menu-item {
    position: relative;
    padding: 2px 8px;
    cursor: default;
}

.menu-item:hover {
    background: #000080;
    color: #fff;
}

.dropdown {
    display: none;
    position: absolute;
    top: 100%;
    left: 0;
    background: #C0C0C0;
    border: 2px outset #fff;
    min-width: 160px;
    z-index: 10;
}

.menu-item:hover .dropdown {
    display: block;
}

.dropdown-item {
    padding: 4px 10px;
    white-space: nowrap;
}

.dropdown-item:hover {
    background: #000080;
    color: #fff;
}

.dropdown-separator {
    height: 1px;
    margin: 4px 2px;
    background: #808080;
}

/* ===== CONTENT ===== */

.header {
    margin-bottom: 6px;
}

h1 {
    font-size: 14px;
    margin: 0 0 4px 0;
}

.description {
    padding: 6px;
    border: 2px inset #fff;
}

.container {
    display: flex;
    flex-direction: column;
    gap: 6px;
}

.canvas-wrapper {
    padding: 6px;
    border: 2px inset #fff;
    width: fit-content;
}

#gameboy-canvas {
    display: block;
    background: #000;
    image-rendering: pixelated;
}

.status {
    padding: 4px 6px;
    border: 2px inset #fff;
}

.keyboard-hints {
    padding: 6px;
    border: 2px inset #fff;
}

.key {
    display: inline-block;
    padding: 1px 6px;
    border: 2px outset #fff;
    font-size: 12px;
}
</style>
</head>

<body>

<!-- MENU BAR -->
<div class="menu-bar">
    <div class="menu-item">
        File
        <div class="dropdown">
            <div class="dropdown-item" id="menu-load">Load ROM...</div>
            <div class="dropdown-item" id="menu-reset">Reset</div>
            <div class="dropdown-item" id="menu-pause">Pause / Resume</div>
            <div class="dropdown-separator"></div>
            <div class="dropdown-item" id="menu-clear">Clear</div>
        </div>
    </div>
</div>

<div class="header">
    <h1>RustyBoi Emulator</h1>
    <div class="description">
        Game Boy emulator designed for programmatic control and AI experimentation.
    </div>
</div>

<div class="container">
    <div class="canvas-wrapper">
        <canvas id="gameboy-canvas"></canvas>
    </div>

    <div id="status" class="status">
        No ROM loaded.
    </div>

    <div class="keyboard-hints">
        <div><span class="key">Arrows/WASD</span> Move</div>
        <div><span class="key">Z</span> A | <span class="key">X</span> B</div>
        <div><span class="key">Enter</span> Start | <span class="key">Shift</span> Select</div>
        <div><span class="key">P</span> Pause</div>
    </div>
</div>

<!-- Hidden file input -->
<input type="file" id="rom-input" accept=".gb,.gbc" style="display:none">

<script type="module">
import init, { WebApp } from './pkg/rustyboi_visualizer_web.js';

let app = null;
let animationFrameId = null;
let isPaused = false;
let currentRom = null;

const buttonMap = new Map();

function initButtonMap() {
    buttonMap.set('ArrowRight', 0); buttonMap.set('d', 0);
    buttonMap.set('ArrowLeft', 1);  buttonMap.set('a', 1);
    buttonMap.set('ArrowUp', 2);    buttonMap.set('w', 2);
    buttonMap.set('ArrowDown', 3);  buttonMap.set('s', 3);

    buttonMap.set('z', 4); buttonMap.set('j', 4);
    buttonMap.set('x', 5); buttonMap.set('k', 5);

    buttonMap.set('Shift', 6);
    buttonMap.set('Enter', 7);
}

async function initApp() {
    await init();
    app = new WebApp("gameboy-canvas");
    initButtonMap();
    setupEvents();
    startLoop();
}

function setupEvents() {
    document.getElementById("menu-load").onclick = () => {
        document.getElementById("rom-input").click();
    };

    document.getElementById("menu-reset").onclick = () => {
        if (currentRom) {
            app.load_rom(currentRom);
            updateStatus("Reset");
        }
    };

    document.getElementById("menu-pause").onclick = () => {
        isPaused = !isPaused;
        updateStatus(isPaused ? "Paused" : "Running");
    };

    document.getElementById("menu-clear").onclick = () => {
        currentRom = null;
        updateStatus("No ROM loaded.");
    };

    document.getElementById("rom-input")
        .addEventListener("change", handleFile);

    document.addEventListener("keydown", handleKeyDown);
    document.addEventListener("keyup", handleKeyUp);
}

async function handleFile(e) {
    const file = e.target.files[0];
    if (!file) return;

    const buffer = await file.arrayBuffer();
    currentRom = new Uint8Array(buffer);
    app.load_rom(currentRom);
    updateStatus("Loaded: " + file.name);
}

function handleKeyDown(e) {
    if (!app || !app.is_loaded()) return;

    if (e.key === 'p') {
        isPaused = !isPaused;
        updateStatus(isPaused ? "Paused" : "Running");
        return;
    }

    const b = buttonMap.get(e.key);
    if (b !== undefined) app.set_button(b, true);
}

function handleKeyUp(e) {
    if (!app || !app.is_loaded()) return;

    const b = buttonMap.get(e.key);
    if (b !== undefined) app.set_button(b, false);
}

function updateStatus(msg) {
    document.getElementById("status").textContent = msg;
}

function loop() {
    if (app && app.is_loaded() && !isPaused) {
        app.run_frame();
    }
    if (app) app.draw();
    animationFrameId = requestAnimationFrame(loop);
}

function startLoop() {
    if (animationFrameId) cancelAnimationFrame(animationFrameId);
    loop();
}

initApp();
</script>

</body>
</html>
